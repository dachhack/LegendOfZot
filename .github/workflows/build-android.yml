name: Build Android APK

# Trigger rules designed so each commit fires AT MOST one build:
#   - Push to main   -> full build + release publish
#   - PR to main     -> build for validation (one run per commit on the branch)
#   - Manual         -> workflow_dispatch from the GitHub UI
# Previously we also listened to `push: claude/*`, which caused duplicate
# runs (push + PR) for the same commit during feature-branch development.
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# Cancel any in-progress run for the same ref when a new commit arrives.
# Saves CI minutes when we push several times in quick succession.
concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write  # Needed for creating releases

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Skip if PR is already merged
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # When a PR is squash-merged quickly, the pull_request run may still
          # be in flight while the main push kicks off its own build. This step
          # aborts the now-redundant PR run so we don't burn minutes twice.
          merged=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} --json merged --jq .merged)
          if [ "$merged" = "true" ]; then
            echo "PR #${{ github.event.pull_request.number }} already merged — cancelling this run."
            gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}
            # Sleep so subsequent steps don't start before the cancel lands
            sleep 60
            exit 1
          fi
          echo "PR still open, proceeding with validation build."

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Briefcase
        run: pip install "briefcase==0.3.26" Pillow

      - name: Create Android project
        run: briefcase create android

      - name: Patch Android theme to match local build
        run: |
          COLORS=build/wizardscavern/android/gradle/app/src/main/res/values/colors.xml
          cat > "$COLORS" << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#000000</color>
              <color name="colorPrimaryDark">#000000</color>
              <color name="colorAccent">#2a2a2a</color>
              <color name="colorSplashScreenBackground">#FFFFFF</color>
          </resources>
          XMLEOF

          STYLES=build/wizardscavern/android/gradle/app/src/main/res/values/styles.xml
          cat > "$STYLES" << 'XMLEOF'
          <resources>
              <style name="AppTheme.Base" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="colorAccent">@color/colorAccent</item>
              </style>
              <style name="AppTheme" parent="AppTheme.Base"/>
              <style name="AppTheme.Launcher">
                  <item name="android:windowBackground">@drawable/splash_screen_background</item>
              </style>
          </resources>
          XMLEOF

      - name: Update Android project with latest resources
        run: briefcase update android

      - name: Override launcher icons with app icon
        run: |
          RES=build/wizardscavern/android/gradle/app/src/main/res
          SRC=wizardscavern/resources/wizardscavern.png
          declare -A SIZES=(["mdpi"]=48 ["hdpi"]=72 ["xhdpi"]=96 ["xxhdpi"]=144 ["xxxhdpi"]=192)
          for density in "${!SIZES[@]}"; do
            size=${SIZES[$density]}
            dir="$RES/mipmap-${density}"
            python3 -c "
          from PIL import Image
          img = Image.open('$SRC').resize(($size, $size), Image.LANCZOS)
          img.save('${dir}/ic_launcher.png')
          img.save('${dir}/ic_launcher_round.png')
          img.save('${dir}/ic_launcher_foreground.png')
          "
          done
          echo "Icons overwritten for all densities"

      - name: Build Android APK
        run: briefcase build android

      - name: Find APK file
        id: find-apk
        run: |
          APK_PATH=$(find . -name "*.apk" -type f | head -1)
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "Found APK at: $APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wizards-cavern-apk
          path: ${{ steps.find-apk.outputs.apk_path }}
          if-no-files-found: error
          compression-level: 0

      - name: Create GitHub Release with APK
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Generate a tag from short SHA and date
          TAG="build-$(date -u +%Y%m%d-%H%M%S)"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          COMMIT_MSG=$(git log -1 --pretty=%s)

          # Copy APK with a clean name
          cp "${{ steps.find-apk.outputs.apk_path }}" "wizards-cavern-${TAG}.apk"

          # Delete previous 'latest' release if it exists
          gh release delete latest --yes 2>/dev/null || true
          git push --delete origin latest 2>/dev/null || true

          # Create a 'latest' release (always points to newest build)
          gh release create latest \
            --title "Latest Build (${SHORT_SHA})" \
            --notes "**${COMMIT_MSG}**

          Commit: ${GITHUB_SHA}
          Built: $(date -u '+%Y-%m-%d %H:%M UTC')

          Download the APK below and install on your Android device." \
            --prerelease \
            "wizards-cavern-${TAG}.apk#Wizards-Cavern.apk"

      - name: Install Google Drive dependencies
        if: steps.find-apk.outputs.apk_path != ''
        continue-on-error: true
        run: pip install google-api-python-client google-auth requests

      - name: Upload APK to Google Drive
        if: steps.find-apk.outputs.apk_path != ''
        continue-on-error: true
        env:
          PYTHONUNBUFFERED: "1"
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: python .github/scripts/upload_to_drive.py "${{ steps.find-apk.outputs.apk_path }}"
